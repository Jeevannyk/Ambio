# Render Blueprint — Ambio (Vite SPA + LiveKit token server)
# A single Node web service builds the frontend and serves it alongside the
# /api/token endpoint, so the LiveKit secret stays server-side and rooms get
# reliable signaling + TURN from LiveKit Cloud.
#
# Set the three LIVEKIT_* env vars in the Render dashboard (they're marked
# sync:false so they aren't committed). Grab them from your LiveKit Cloud
# project: Settings -> Keys.
services:
  - type: web
    name: ambio
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
